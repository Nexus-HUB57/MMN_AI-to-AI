name: Trigger Backend Deploy Hook

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: backend-hook-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-backend:
    name: Acionar deploy do backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}
    steps:
      - name: Resolver estratégia de deploy
        id: strategy
        env:
          BACKEND_DEPLOY_HOOK_URL: ${{ secrets.BACKEND_DEPLOY_HOOK_URL }}
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          hook_url="${BACKEND_DEPLOY_HOOK_URL:-${RENDER_DEPLOY_HOOK_URL:-}}"

          if [ -n "$hook_url" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "strategy=deploy_hook" >> "$GITHUB_OUTPUT"
            echo "target=$hook_url" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "${RENDER_API_KEY:-}" ] && [ -n "${RENDER_SERVICE_ID:-}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "strategy=render_api" >> "$GITHUB_OUTPUT"
            echo "target=https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "configured=false" >> "$GITHUB_OUTPUT"
          echo "strategy=missing" >> "$GITHUB_OUTPUT"
          echo "target=" >> "$GITHUB_OUTPUT"
          echo "Nenhum deploy hook nem credencial da Render configurados; workflow será finalizado sem erro."

      - name: Acionar deploy do backend
        if: steps.strategy.outputs.configured == 'true'
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          echo "Estratégia selecionada: ${{ steps.strategy.outputs.strategy }}"

          if [ "${{ steps.strategy.outputs.strategy }}" = "deploy_hook" ]; then
            response=$(curl --silent --show-error --location --write-out "\n%{http_code}" --request POST \
              "${{ steps.strategy.outputs.target }}" \
              --header "Content-Type: application/json")
          else
            response=$(curl --silent --show-error --location --write-out "\n%{http_code}" --request POST \
              "${{ steps.strategy.outputs.target }}" \
              --header "Authorization: Bearer ${RENDER_API_KEY}" \
              --header "Accept: application/json" \
              --header "Content-Type: application/json" \
              --data '{"clearCache":"do_not_clear"}')
          fi

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n -1)

          echo "Status: $http_code"
          echo "Response: $body"

          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            echo "Deploy do backend acionado com sucesso!"
          else
            echo "Erro ao acionar deploy do backend: $http_code"
            echo "$body"
            exit 1
          fi

      - name: Resumo do deploy
        if: always()
        env:
          STRATEGY: ${{ steps.strategy.outputs.strategy }}
          CONFIGURED: ${{ steps.strategy.outputs.configured }}
          TARGET: ${{ steps.strategy.outputs.target }}
        run: |
          {
            echo "## 🚀 Backend Deploy"
            echo
            if [ "$CONFIGURED" != "true" ]; then
              echo "### ℹ️ Estratégia não configurada"
              echo "Defina BACKEND_DEPLOY_HOOK_URL ou RENDER_DEPLOY_HOOK_URL, ou então RENDER_API_KEY + RENDER_SERVICE_ID."
            elif [ "${{ job.status }}" = "success" ]; then
              echo "### ✅ Deploy acionado"
            else
              echo "### ❌ Falha ao acionar deploy"
            fi
            echo
            echo "| Campo | Valor |"
            echo "|-------|-------|"
            echo "| Estratégia | ${STRATEGY:-missing} |"
            echo "| Target | ${TARGET:-n/a} |"
            echo "| Commit | ${{ github.sha }} |"
            echo "| Branch | ${{ github.ref_name }} |"
          } >> "$GITHUB_STEP_SUMMARY"
