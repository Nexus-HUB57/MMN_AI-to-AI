<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="nexusGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="50%" stop-color="#7B61FF"/>
      <stop offset="100%" stop-color="#B16CFF"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Aura -->
  <circle cx="32" cy="32" r="30" fill="url(#glow)"/>
  <!-- Cabeça do robô IA -->
  <rect x="14" y="18" width="36" height="28" rx="8" fill="#0A0E1A" stroke="url(#nexusGrad)" stroke-width="2.5"/>
  <!-- Antena com aura -->
  <line x1="32" y1="18" x2="32" y2="10" stroke="url(#nexusGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="32" cy="8" r="3" fill="#00E5FF">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Olhos IA -->
  <circle cx="24" cy="30" r="3.5" fill="url(#nexusGrad)"/>
  <circle cx="40" cy="30" r="3.5" fill="url(#nexusGrad)"/>
  <circle cx="24" cy="30" r="1.4" fill="#FFFFFF"/>
  <circle cx="40" cy="30" r="1.4" fill="#FFFFFF"/>
  <!-- Boca / sinal de processamento -->
  <rect x="22" y="38" width="20" height="3" rx="1.5" fill="#00E5FF" opacity="0.7"/>
  <!-- Laterais (orelhas IA) -->
  <rect x="10" y="26" width="4" height="12" rx="2" fill="url(#nexusGrad)"/>
  <rect x="50" y="26" width="4" height="12" rx="2" fill="url(#nexusGrad)"/>
  <!-- Base / conector -->
  <rect x="26" y="46" width="12" height="6" rx="2" fill="#0A0E1A" stroke="url(#nexusGrad)" stroke-width="1.5"/>
  <line x1="29" y1="52" x2="29" y2="56" stroke="url(#nexusGrad)" stroke-width="2"/>
  <line x1="35" y1="52" x2="35" y2="56" stroke="url(#nexusGrad)" stroke-width="2"/>
</svg>
