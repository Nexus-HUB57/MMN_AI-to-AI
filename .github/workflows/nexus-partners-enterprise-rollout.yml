name: 🚀 Nexus Partners Pack · Enterprise Rollout

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Ambiente alvo"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      api_base_url:
        description: "Base da API para smoke tests"
        required: true
        default: "https://api.oneverso.com.br"
      skip_build:
        description: "Pular build da aplicação"
        required: true
        default: false
        type: boolean
      trigger_backend_rollout:
        description: "Acionar deploy hook/Render após validação"
        required: true
        default: false
        type: boolean

env:
  NODE_VERSION: "20"

jobs:
  rollout:
    name: Nexus Partners Pack · ${{ github.event.inputs.target_environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: ${{ github.event.inputs.target_environment }}
    permissions:
      contents: read
    env:
      API_BASE_URL: ${{ github.event.inputs.api_base_url }}
      NEXUS_PARTNERS_OPENAI_API_KEY: ${{ secrets.NEXUS_PARTNERS_OPENAI_API_KEY }}
      NEXUS_OPEN_API_KEY: ${{ secrets.NEXUS_OPEN_API_KEY }}
      NEXUS_OPEN_API_KEYS: ${{ secrets.NEXUS_OPEN_API_KEYS }}
      BACKEND_DEPLOY_HOOK_URL: ${{ secrets.BACKEND_DEPLOY_HOOK_URL }}
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Validar secrets mínimas do NPP
        run: |
          missing=0
          for name in NEXUS_PARTNERS_OPENAI_API_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "❌ Secret obrigatória ausente: $name"
              missing=$((missing+1))
            else
              echo "✅ Secret detectada: $name"
            fi
          done

          if [ -z "${NEXUS_OPEN_API_KEY:-}" ] && [ -z "${NEXUS_OPEN_API_KEYS:-}" ]; then
            if [ "${{ github.event.inputs.target_environment }}" = "production" ]; then
              echo "❌ Defina NEXUS_OPEN_API_KEY ou NEXUS_OPEN_API_KEYS no environment do GitHub Actions para produção."
              missing=$((missing+1))
            else
              echo "⚠️ Sem credencial OpenAPI dedicada no staging; o workflow vai cair para smoke público via tRPC."
            fi
          else
            echo "✅ Credencial OpenAPI detectada"
          fi

          if [ "$missing" -gt 0 ]; then
            exit 1
          fi

      - name: Instalar dependências
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build completo
        if: ${{ github.event.inputs.skip_build != 'true' }}
        run: npm run build

      - name: Acionar rollout do backend
        if: ${{ github.event.inputs.trigger_backend_rollout == 'true' }}
        run: |
          hook_url="${BACKEND_DEPLOY_HOOK_URL:-${RENDER_DEPLOY_HOOK_URL:-}}"

          if [ -n "$hook_url" ]; then
            echo "🔄 Acionando deploy hook"
            curl --fail --silent --show-error --location --request POST "$hook_url" --header "Content-Type: application/json"
            exit 0
          fi

          if [ -n "${RENDER_API_KEY:-}" ] && [ -n "${RENDER_SERVICE_ID:-}" ]; then
            echo "🔄 Acionando rollout via Render API"
            curl --fail --silent --show-error --location --request POST \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
              --header "Authorization: Bearer ${RENDER_API_KEY}" \
              --header "Accept: application/json" \
              --header "Content-Type: application/json" \
              --data '{"clearCache":"do_not_clear"}'
            exit 0
          fi

          echo "ℹ️ Nenhum deploy hook/Render configurado; seguindo para smoke tests."

      - name: Smoke tests do gateway NPP
        run: bash scripts/check_npp_enterprise_rollout.sh "$API_BASE_URL" "$NEXUS_OPEN_API_KEY" "$NEXUS_OPEN_API_KEYS" "${{ github.event.inputs.target_environment }}"

      - name: Sumário
        if: always()
        run: |
          {
            echo "## Nexus Partners Pack · Enterprise Rollout"
            echo
            echo "- Ambiente: ${{ github.event.inputs.target_environment }}"
            echo "- API base: $API_BASE_URL"
            echo "- Skip build: ${{ github.event.inputs.skip_build }}"
            echo "- Trigger backend rollout: ${{ github.event.inputs.trigger_backend_rollout }}"
            echo "- Status final: ${{ job.status }}"
            echo "- OpenAPI auth secret presente: ${{ secrets.NEXUS_OPEN_API_KEY != '' || secrets.NEXUS_OPEN_API_KEYS != '' }}"
          } >> "$GITHUB_STEP_SUMMARY"
