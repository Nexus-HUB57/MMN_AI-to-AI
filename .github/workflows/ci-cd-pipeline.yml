name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  CI: "true"
  FORCE_COLOR: "1"
  NODE_OPTIONS: --max-old-space-size=4096
  BROWSER_UA: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/137.0.0.0 Safari/537.36
  HTML_ACCEPT: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Run lint
        run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Diagnose workspaces
        run: npm run doctor:workspaces

      - name: Run typecheck
        run: npm run typecheck

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Run test suite
        run: npm run test
        env:
          NODE_ENV: test

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint, typecheck, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build backend
        run: npm run build:backend

      - name: Upload backend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: backend/dist
          retention-days: 7

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint, typecheck, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build frontend
        run: npm run build:frontend

      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist
          retention-days: 7

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download backend artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: backend/dist

      - name: Download frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # TODO: adicionar comandos reais de deploy

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download backend artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: backend/dist

      - name: Download frontend artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist

      - name: Instalar lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy do frontend para HostGator
        env:
          HOSTGATOR_HOST: ${{ secrets.HOSTGATOR_HOST }}
          HOSTGATOR_USER: ${{ secrets.HOSTGATOR_USER }}
          HOSTGATOR_PASS: ${{ secrets.HOSTGATOR_PASS }}
          HOSTGATOR_REMOTE_PATH: ${{ secrets.HOSTGATOR_REMOTE_PATH }}
        run: |
          if [ -z "${HOSTGATOR_USER:-}" ] || [ -z "${HOSTGATOR_PASS:-}" ]; then
            echo "HOSTGATOR_USER/HOSTGATOR_PASS não configurados; pulando deploy do frontend."
            exit 0
          fi
          chmod +x scripts/deploy-hostgator-frontend.sh
          ./scripts/deploy-hostgator-frontend.sh

      - name: Acionar deploy hook do backend (opcional)
        env:
          BACKEND_DEPLOY_HOOK_URL: ${{ secrets.BACKEND_DEPLOY_HOOK_URL }}
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          hook_url="${BACKEND_DEPLOY_HOOK_URL:-${RENDER_DEPLOY_HOOK_URL:-}}"
          if [ -z "$hook_url" ]; then
            echo "Nenhum hook de deploy do backend configurado; pulando."
            exit 0
          fi
          response=$(curl --silent --show-error --location --write-out "\n%{http_code}" --request POST \
            "$hook_url" \
            --header "Content-Type: application/json")
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n -1)
          echo "Status: $http_code"
          echo "Response: $body"
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            exit 1
          fi

  smoke-production:
    name: Smoke Tests Production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [deploy-production]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Verificar portal raiz
        run: |
          code=$(curl -sL -A "$BROWSER_UA" -H "Accept: $HTML_ACCEPT" -o /tmp/root.html -w "%{http_code}" https://oneverso.com.br)
          echo "HTTP root: $code"
          test "$code" = "200"
          grep -qi '<html' /tmp/root.html
          if grep -qi 'Not Acceptable' /tmp/root.html; then
            echo "ModSecurity bloqueou a resposta HTML do portal." >&2
            exit 1
          fi

      - name: Verificar SPA fallback /login
        run: |
          code=$(curl -sL -A "$BROWSER_UA" -H "Accept: $HTML_ACCEPT" -o /tmp/login.html -w "%{http_code}" https://oneverso.com.br/login)
          echo "HTTP /login: $code"
          test "$code" = "200"
          grep -qi '<html' /tmp/login.html
          if grep -qi 'Not Acceptable' /tmp/login.html; then
            echo "ModSecurity bloqueou o fallback SPA em /login." >&2
            exit 1
          fi

      - name: Verificar asset principal do portal
        run: |
          asset=$(grep -oE 'src="/assets/index-[A-Za-z0-9_-]+\.js"' /tmp/root.html | head -1 | sed 's/src="//' | sed 's/"//')
          echo "Asset detectado: $asset"
          test -n "$asset"
          curl -fsSIL -A "$BROWSER_UA" -H 'Accept: */*' "https://oneverso.com.br$asset" >/dev/null

      - name: Verificar health da API
        run: |
          code=$(curl -s -o /tmp/api-health.json -w "%{http_code}" https://api.oneverso.com.br/health)
          echo "HTTP api /health: $code"
          test "$code" = "200"
          grep -Eqi 'ok|healthy|status' /tmp/api-health.json

      - name: Resumo
        if: always()
        run: |
          {
            echo "## 🧪 Smoke Tests de Produção"
            echo
            echo "- Portal: https://oneverso.com.br"
            echo "- Login (SPA fallback): https://oneverso.com.br/login"
            echo "- API health: https://api.oneverso.com.br/health"
            echo
            echo "Status final: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"
