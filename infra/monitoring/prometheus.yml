global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'ia-content-hub-monitor'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - '/etc/prometheus/rules.yml'

scrape_configs:
  # ============ PROMETHEUS ============
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ============ NODE EXPORTER ============
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # ============ CADVISOR ============
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # ============ BACKEND API ============
  - job_name: 'ia-content-hub-backend'
    static_configs:
      - targets: ['localhost:3001']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # ============ REDIS ============
  - job_name: 'redis'
    static_configs:
      - targets: ['localhost:6379']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}:6379'

  # ============ MYSQL ============
  - job_name: 'mysql'
    static_configs:
      - targets: ['localhost:3306']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(?::\d+)?'
        replacement: '${1}:3306'
