name: 🚀 PRD v2.2 — Go Live Nexus AffilIAte (Helena Nexus)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Digite GO-LIVE para confirmar deploy em produção'
        required: true
        default: 'GO-LIVE'
      skip_frontend_build:
        description: 'Pular build frontend (rebuild manual)?'
        required: false
        default: 'false'
  push:
    tags:
      - 'v2.2.*'

env:
  REMOTE_APP: /var/www/oneverso/current
  REMOTE_REPO: /var/www/oneverso/repo

jobs:
  deploy:
    name: 🚀 Deploy v2.2.0
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'GO-LIVE' || startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔑 Setup SSH via Secrets
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          cat > ~/.ssh/config <<EOF
          Host nexus-prod
            HostName ${{ secrets.VPS_HOST }}
            Port ${{ secrets.VPS_PORT }}
            User root
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ConnectTimeout 15
          EOF
          echo "SSH configurado para ${{ secrets.VPS_HOST }}:${{ secrets.VPS_PORT }}"

      - name: 🩺 Pré-check conexão
        run: |
          ssh nexus-prod "echo '✅ Conectado' && uname -a && pm2 list --no-color | head -15"

      - name: 🗄️ Backup PostgreSQL
        run: |
          ssh nexus-prod "sudo -u postgres pg_dump nexus_prod | gzip > /var/backups/oneverso-pre-prd-v22-$(date +%Y%m%d_%H%M%S).sql.gz && ls -lh /var/backups/oneverso-pre-prd-v22-*.sql.gz | tail -1"

      - name: 📤 Upload artefatos v2.2
        run: |
          scp docs/migrations/2026-07-01_prd_v22.sql nexus-prod:/tmp/prd_v22_migration.sql
          scp scripts/deploy/frontend_patches_v22.py nexus-prod:/tmp/prd_v22_frontend.py

      - name: 🛢️ Executar migration SQL
        run: |
          ssh nexus-prod "sudo -u postgres psql -d nexus_prod -f /tmp/prd_v22_migration.sql 2>&1 | tail -30" | tee migration.log
          echo "═══ Validação ═══"
          grep -E 'admin_count|meeting_signals|commission_rules|settings_email' migration.log || true

      - name: 🎨 Aplicar patches frontend
        run: |
          ssh nexus-prod "cd ${{ env.REMOTE_APP }} && FRONTEND_PATH=${{ env.REMOTE_APP }}/frontend/src python3 /tmp/prd_v22_frontend.py"

      - name: 🏗️ Build frontend (vite)
        if: github.event.inputs.skip_frontend_build != 'true'
        run: |
          ssh nexus-prod "cd ${{ env.REMOTE_APP }}/frontend && npm run build 2>&1 | tail -15"

      - name: 🔄 Restart PM2
        run: |
          ssh nexus-prod "pm2 restart mmn-api && sleep 3 && pm2 list --no-color"

      - name: 🧪 Smoke tests
        run: |
          set -e
          FAILED=0
          for ep in "api/health" "api/trpc/marketplaceNexus.listEbooks?input=%7B%7D" "api/trpc/banking.getBtcBrlQuote?input=%7B%7D"; do
            STATUS=$(curl -sS -o /dev/null -w "%{http_code}" -m 15 "https://oneverso.com.br/$ep")
            echo "  /$ep => HTTP $STATUS"
            [ "$STATUS" = "200" ] || FAILED=$((FAILED+1))
          done
          [ "$FAILED" = "0" ] && echo "✅ Todos endpoints 200 OK" || { echo "❌ $FAILED endpoints falharam"; exit 1; }

      - name: 🏷️ Tag v2.2.0
        if: startsWith(github.ref, 'refs/tags/') == false
        run: |
          git config user.name "Helena Nexus"
          git config user.email "helena@nexus-affiliate.ai"
          git tag -f v2.2.0
          git push origin v2.2.0 --force

      - name: 📊 Sumário Go Live
        if: always()
        run: |
          echo "════════════════════════════════════════"
          echo "🚀 PRD v2.2.0 — Nexus AffilIAte"
          echo "Owner: Helena Nexus (CMO/AI)"
          echo "Health: https://oneverso.com.br/api/health"
          echo "Tag: v2.2.0"
          echo "════════════════════════════════════════"
