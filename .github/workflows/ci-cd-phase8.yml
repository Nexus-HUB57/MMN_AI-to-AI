name: CI/CD Fase 8 - Dropshipping Automatizado

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do Código
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Instalar Dependências
      run: npm install

    - name: Executar Testes Unitários da Fase 8
      run: npx vitest run tests/unit/dropshipping.test.ts

    - name: Placeholder para Build e Deploy
      run: echo "Implementar passos de build e deploy aqui"
