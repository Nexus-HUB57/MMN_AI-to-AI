name: Trigger Backend Deploy Hook

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: backend-hook-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-backend:
    name: Acionar deploy do backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}
    steps:
      - name: Resolver deploy hook configurado
        id: hook
        env:
          BACKEND_DEPLOY_HOOK_URL: ${{ secrets.BACKEND_DEPLOY_HOOK_URL }}
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          hook_url="${BACKEND_DEPLOY_HOOK_URL:-${RENDER_DEPLOY_HOOK_URL:-}}"
          if [ -z "$hook_url" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "hook_url=" >> "$GITHUB_OUTPUT"
            echo "Nenhum deploy hook configurado; workflow será finalizado sem erro."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "hook_url=$hook_url" >> "$GITHUB_OUTPUT"
          fi

      - name: Acionar hook do backend
        if: steps.hook.outputs.configured == 'true'
        run: |
          echo "CI passou em push para main — acionando backend deploy hook..."
          response=$(curl --silent --show-error --location --write-out "\n%{http_code}" --request POST \
            "${{ steps.hook.outputs.hook_url }}" \
            --header "Content-Type: application/json")

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n -1)

          echo "Status: $http_code"
          echo "Response: $body"

          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            echo "Deploy do backend acionado com sucesso!"
          else
            echo "Erro ao acionar deploy do backend: $http_code"
            echo "$body"
            exit 1
          fi

      - name: Resumo do deploy
        if: always()
        run: |
          {
            echo "## 🚀 Backend Deploy Hook"
            echo
            if [ "${{ steps.hook.outputs.configured }}" != "true" ]; then
              echo "### ℹ️ Deploy hook não configurado"
              echo "Defina `BACKEND_DEPLOY_HOOK_URL` ou `RENDER_DEPLOY_HOOK_URL` para automação do backend."
            elif [ "${{ job.status }}" = "success" ]; then
              echo "### ✅ Backend deploy acionado"
            else
              echo "### ❌ Falha ao acionar backend deploy"
            fi
            echo
            echo "| Campo | Valor |"
            echo "|-------|-------|"
            echo "| Commit | ${{ github.sha }} |"
            echo "| Branch | ${{ github.ref_name }} |"
          } >> "$GITHUB_STEP_SUMMARY"
