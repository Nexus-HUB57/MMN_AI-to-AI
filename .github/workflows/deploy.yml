name: Deploy to Replit

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Trigger Replit Deploy Hook
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    steps:
      - name: Validar secret de deploy
        run: |
          if [ -z "${{ secrets.REPLIT_DEPLOY_HOOK_URL }}" ]; then
            echo "REPLIT_DEPLOY_HOOK_URL não configurado"
            exit 1
          fi

      - name: Trigger Replit redeploy via deploy hook
        run: |
          echo "CI passou em push para main — acionando redeploy no Replit..."
          response=$(curl --silent --show-error --location --write-out "\n%{http_code}" --request POST \
            "${{ secrets.REPLIT_DEPLOY_HOOK_URL }}" \
            --header "Content-Type: application/json")

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n -1)

          echo "Status: $http_code"
          echo "Response: $body"

          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            echo "Deploy acionado com sucesso!"
          else
            echo "Erro ao acionar deploy: $http_code"
            echo "$body"
            exit 1
          fi

      - name: Resumo do deploy
        if: always()
        run: |
          {
            echo "## 🚀 MMN AI-to-AI — Deploy"
            echo
            if [ "${{ job.status }}" = "success" ]; then
              echo "### ✅ Deploy acionado com sucesso"
              echo "O Replit está atualizando o ambiente de produção."
            else
              echo "### ❌ Falha ao acionar o deploy"
              echo "Verifique se o secret REPLIT_DEPLOY_HOOK_URL está configurado corretamente no repositório."
            fi
            echo
            echo "| Campo | Valor |"
            echo "|-------|-------|"
            echo "| CI Run | [Ver CI](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}) |"
            echo "| Commit | ${{ github.event.workflow_run.head_sha }} |"
            echo "| Branch | ${{ github.event.workflow_run.head_branch }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  notify-deploy-failure:
    name: Notificar falha de deploy
    runs-on: ubuntu-latest
    needs: [deploy]
    if: failure()
    steps:
      - name: Resumo de falha
        run: |
          {
            echo "## ❌ MMN AI-to-AI — Deploy falhou"
            echo
            echo "O CI passou, mas o deploy automático para o Replit não foi concluído."
            echo
            echo "**Causa provável:** secret REPLIT_DEPLOY_HOOK_URL ausente, inválido ou recusando a chamada."
            echo
            echo "🔗 [Ver logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          } >> "$GITHUB_STEP_SUMMARY"
