# ============================================
# Nginx Configuration - MMN AI-to-AI
# Domain: oneverso.com.br
# ============================================

# ============================================
# HTTP to HTTPS Redirect
# ============================================
server {
    listen 80;
    server_name oneverso.com.br www.oneverso.com.br;
    return 301 https://$server_name$request_uri;
}

# ============================================
# HTTPS Configuration
# ============================================
server {
    listen 443 ssl http2;
    server_name oneverso.com.br www.oneverso.com.br;

    # ============================================
    # SSL Certificate (Let's Encrypt)
    # ============================================
    ssl_certificate /etc/letsencrypt/live/oneverso.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oneverso.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ============================================
    # SSL Settings
    # ============================================
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # ============================================
    # Application Paths
    # ============================================
    root /var/www/oneverso.com.br/frontend/dist;
    index index.html;

    # ============================================
    # Security Headers
    # ============================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ============================================
    # Gzip Compression
    # ============================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_disable "msie6";
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/svg+xml;

    # ============================================
    # Frontend Routes (SPA)
    # ============================================
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ============================================
    # Static Assets - Long Cache
    # ============================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ============================================
    # API tRPC Proxy
    # ============================================
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket Support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        # Don't cache API responses
        proxy_no_cache 1;
        proxy_cache_bypass 1;

        add_header X-Proxy-Cache "MISS" always;
    }

    # ============================================
    # tRPC Inspector (Development)
    # ============================================
    location /trpc {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        allow 127.0.0.1;
        deny all;
    }

    # ============================================
    # Health Check Endpoint
    # ============================================
    location /health {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # ============================================
    # Error Pages
    # ============================================
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    # ============================================
    # Logging
    # ============================================
    access_log /var/log/nginx/oneverso_access.log;
    error_log /var/log/nginx/oneverso_error.log;

    # ============================================
    # Max Upload Size (for images/content)
    # ============================================
    client_max_body_size 10M;
}