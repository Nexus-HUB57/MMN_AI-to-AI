# =============================================================================
# Nexus Affil'IA'te — Deploy production via GitHub Actions (Deploy Key + SSH)
# =============================================================================
# Updated by CEO-010: fixed branches trigger, aligned SSH pattern

name: Deploy production
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install workspaces
        run: |
          npm install --workspace backend --workspace frontend \
            --legacy-peer-deps --no-audit --no-fund

      - name: Build backend
        run: npm --workspace backend run build

      - name: Build frontend
        run: NODE_OPTIONS=--max-old-space-size=4096 npm --workspace frontend run build

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_GITHUB }}

      - name: Trust host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p 22022 -H 143.95.213.237 >> ~/.ssh/known_hosts

      - name: Sync build to server
        run: |
          rsync -az --delete \
            -e "ssh -p 22022" \
            ./ root@143.95.213.237:/var/www/oneverso/current/

      - name: Apply pending migrations
        env:
          DEPLOY_DATABASE_URL: ${{ secrets.DEPLOY_DATABASE_URL }}
        run: |
          ssh -p 22022 root@143.95.213.237 "
            cd /var/www/oneverso/current
            if [ -f .env ]; then set -a; source .env; set +a; fi
            DB_URL=\${DATABASE_URL:-\${DEPLOY_DATABASE_URL:-}}
            if [ -n \"\$DB_URL\" ]; then
              for f in database/migrations/*.sql; do
                echo \"Applying \$f ...\"
                psql \"\$DB_URL\" -v ON_ERROR_STOP=1 -f \"\$f\" 2>&1 | tail -5
              done
            else
              echo 'WARNING: DATABASE_URL not available, skipping migrations'
            fi
            pm2 reload all --update-env 2>/dev/null || true
            pm2 save 2>/dev/null || true
          "

      - name: Healthcheck
        run: |
          sleep 5
          for path in /api/health; do
            code=$(curl -sS -o /dev/null -w '%{http_code}' -m 20 "https://oneverso.com.br${path}" || echo 000)
            echo "  $path → HTTP $code"
          done
