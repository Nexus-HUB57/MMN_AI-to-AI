<!doctype html><html lang="pt-BR"><head><meta charset="utf-8">
<title>Lib Nexus · Academ'IA</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
:root{color-scheme:dark}*{box-sizing:border-box}
body{margin:0;background:radial-gradient(circle at 80% 0%,#0c0c22 0%,#05050f 60%);color:#e6e6f5;font-family:Inter,system-ui,sans-serif;line-height:1.55}
header{padding:36px 24px;border-bottom:1px solid #20203a;background:rgba(10,10,28,.7);backdrop-filter:blur(8px);position:sticky;top:0;z-index:5}
.container{max-width:1180px;margin:0 auto;padding:0 24px}
h1{margin:0;font-size:34px;background:linear-gradient(90deg,#a855f7,#22d3ee);-webkit-background-clip:text;color:transparent}
h2{color:#a855f7;margin:32px 0 14px;font-size:20px;border-bottom:1px solid #20203a;padding-bottom:8px}
.sub{opacity:.7;font-size:15px;margin-top:6px}
.grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));padding:8px 0 60px}
.card{background:#0d0d22;border:1px solid #20203a;border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:8px;transition:transform .15s,border-color .15s}
.card:hover{transform:translateY(-2px);border-color:#a855f755}
.card .tag{font-size:11px;color:#a855f7;background:#161630;border:1px solid #20203a;padding:2px 8px;border-radius:999px;align-self:flex-start;text-transform:uppercase;letter-spacing:.5px}
.card h3{margin:4px 0 0;font-size:16px;color:#fff}
.card .repo{font-size:11px;opacity:.55;word-break:break-all}
.card a.btn{padding:8px 10px;border-radius:8px;font-size:13px;text-decoration:none;border:1px solid #20203a;color:#a855f7;text-align:center;flex:1}
.card a.btn.primary{background:linear-gradient(90deg,#a855f7,#22d3ee);color:#001;border-color:transparent;font-weight:600}
.links{display:flex;gap:8px;margin-top:auto}
.footer{padding:30px 24px;border-top:1px solid #20203a;opacity:.65;font-size:13px;text-align:center}
.empty{padding:30px;text-align:center;opacity:.6}
.search{margin:18px 0;width:100%;max-width:520px;padding:10px 14px;background:#0d0d22;border:1px solid #20203a;border-radius:10px;color:#e6e6f5;font-size:14px}
.kpi{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin:18px 0 0}
.kpi .item{background:#0d0d22;border:1px solid #20203a;border-radius:12px;padding:14px}
.kpi .item .v{font-size:24px;color:#a855f7}.kpi .item .l{font-size:12px;opacity:.7;text-transform:uppercase;letter-spacing:.5px}
@media (max-width:720px){.kpi{grid-template-columns:repeat(2,minmax(0,1fr))}}
</style></head><body>
<header><div class="container">
<h1>Lib Nexus</h1>
<div class="sub">Knowledge-base, especificações de agentes, API docs e melhores práticas oficiais.</div>
<input id="search" class="search" placeholder="Buscar por tópico..." />
<div class="kpi">
 <div class="item"><div class="v" id="kpi-total">–</div><div class="l">Itens Lib</div></div>
 <div class="item"><div class="v" id="kpi-kb">–</div><div class="l">Knowledge Base</div></div>
 <div class="item"><div class="v" id="kpi-agents">–</div><div class="l">Agents Specs</div></div>
 <div class="item"><div class="v" id="kpi-best">–</div><div class="l">Best Practices</div></div>
</div>
</div></header>
<main class="container">
<h2>Catálogo Lib Nexus</h2>
<div id="grid" class="grid"><div class="empty">Carregando catálogo...</div></div>
</main>
<div class="footer">© Nexus Affil'IA'te · Academ'IA · oneverso.com.br</div>
<script>
function classify(p){
  if(p.includes('knowledge-base')) return 'Knowledge';
  if(p.includes('agents-specs'))   return 'Agents';
  if(p.includes('api-docs'))       return 'API';
  if(p.includes('best-practices')) return 'Best';
  return 'Lib';
}
fetch('/api/academia/catalog').then(r=>r.json()).then(cat=>{
  const items=(cat.lib_nexus||[]).map(x=>({...x, kind:classify(x.repoPath)}));
  document.getElementById('kpi-total').textContent=items.length;
  document.getElementById('kpi-kb').textContent=items.filter(i=>i.kind==='Knowledge').length;
  document.getElementById('kpi-agents').textContent=items.filter(i=>i.kind==='Agents').length;
  document.getElementById('kpi-best').textContent=items.filter(i=>i.kind==='Best').length;
  const grid=document.getElementById('grid');
  function render(){
    const q=document.getElementById('search').value.toLowerCase();
    const list=items.filter(i=>i.name.toLowerCase().includes(q)||i.repoPath.toLowerCase().includes(q));
    if(!list.length){grid.innerHTML='<div class="empty">Nenhum item.</div>';return}
    grid.innerHTML=list.map(i=>`
      <div class="card">
        <span class="tag">${i.kind}</span>
        <h3>${i.name.replace(/\.md$/,'')}</h3>
        <div class="repo">${i.repoPath}</div>
        <div class="links">
          <a class="btn primary" href="${i.htmlUrl}" target="_blank" rel="noopener">Ler HTML</a>
          <a class="btn" href="${i.mdUrl}" target="_blank" rel="noopener">Markdown</a>
        </div>
      </div>`).join('');
  }
  document.getElementById('search').addEventListener('input',render);
  render();
}).catch(()=>{document.getElementById('grid').innerHTML='<div class="empty">Falha ao carregar.</div>';});
</script></body></html>
