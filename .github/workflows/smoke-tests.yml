name: Production Smoke Tests

on:
  workflow_run:
    workflows: [Deploy Frontend to HostGator]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: smoke-tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BROWSER_UA: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/137.0.0.0 Safari/537.36
  HTML_ACCEPT: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8

jobs:
  smoke:
    name: Validar portal e API em produção
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}

    steps:
      - name: Verificar portal raiz
        run: |
          code=$(curl -sL -A "$BROWSER_UA" -H "Accept: $HTML_ACCEPT" -o /tmp/root.html -w "%{http_code}" https://oneverso.com.br)
          echo "HTTP root: $code"
          test "$code" = "200"
          grep -qi '<html' /tmp/root.html
          if grep -qi 'Not Acceptable' /tmp/root.html; then
            echo "ModSecurity bloqueou a resposta HTML do portal." >&2
            exit 1
          fi

      - name: Verificar SPA fallback /login
        run: |
          code=$(curl -sL -A "$BROWSER_UA" -H "Accept: $HTML_ACCEPT" -o /tmp/login.html -w "%{http_code}" https://oneverso.com.br/login)
          echo "HTTP /login: $code"
          test "$code" = "200"
          grep -qi '<html' /tmp/login.html
          if grep -qi 'Not Acceptable' /tmp/login.html; then
            echo "ModSecurity bloqueou o fallback SPA em /login." >&2
            exit 1
          fi

      - name: Verificar asset principal carregado no HTML
        run: |
          asset=$(grep -oE 'src="/assets/index-[A-Za-z0-9_-]+\.js"' /tmp/root.html | head -1 | sed 's/src="//' | sed 's/"//')
          echo "Asset detectado: $asset"
          test -n "$asset"
          curl -fsSIL -A "$BROWSER_UA" -H 'Accept: */*' "https://oneverso.com.br$asset" >/dev/null

      - name: Verificar health da API
        run: |
          code=$(curl -s -o /tmp/api-health.json -w "%{http_code}" https://api.oneverso.com.br/health)
          echo "HTTP api /health: $code"
          test "$code" = "200"
          grep -Eqi 'ok|healthy|status' /tmp/api-health.json

      - name: Validar separacao Nexus Partners Pack x Nexus Affil'IA'te
        run: |
          set -euo pipefail
          mkdir -p /tmp/chunks
          # Extrai todos os chunks de pagina do bundle principal
          asset=$(grep -oE 'src="/assets/index-[A-Za-z0-9_-]+\.js"' /tmp/root.html | head -1 | sed 's/src="//' | sed 's/"//')
          curl -fsSL -A "$BROWSER_UA" "https://oneverso.com.br$asset" -o /tmp/chunks/main.js
          echo "Inspecionando chunks de Subscriptions, PixCheckout, Marketplaces e Home..."
          violations=0
          for page in Subscriptions PixCheckout Marketplaces Home; do
            chunk=$(grep -oE "\"assets/${page}-[A-Za-z0-9_-]+\.js\"" /tmp/chunks/main.js | head -1 | tr -d '"')
            if [ -z "$chunk" ]; then
              echo "::warning::Chunk $page nao encontrado no bundle (lazy chunk pode ter mudado de formato)"
              continue
            fi
            echo "Baixando /$chunk"
            curl -fsSL -A "$BROWSER_UA" "https://oneverso.com.br/$chunk" -o "/tmp/chunks/${page}.js"
            # IDs legados do Nexus Partners Pack (pack-a2/ag/aa SEM sufixo II/III, e sem o prefixo pack-a2ii)
            # devem ter sumido das paginas do produto. A jornada do Affil'IA'te (pack-a2ii, pack-agii, etc) continua valida.
            if grep -qE '"(pack-a2|pack-ag|pack-aa)"' "/tmp/chunks/${page}.js"; then
              # Permite somente se vier no contexto da jornada Affil'IA'te (Marketplaces.tsx referencia NEXUS_PACKS)
              if [ "$page" = "Marketplaces" ]; then
                echo "::notice::$page contem IDs pack-* (esperado: jornada Affil'IA'te)"
              else
                echo "::error::Pagina $page ainda contem identificadores legados pack-a2/ag/aa do Nexus Partners Pack"
                violations=$((violations+1))
              fi
            fi
          done
          # Subscriptions DEVE conter os novos IDs
          if ! grep -qE 'nexus-(start|growth|enterprise)' /tmp/chunks/Subscriptions.js 2>/dev/null; then
            echo "::error::Chunk Subscriptions nao contem os novos IDs nexus-start/growth/enterprise"
            violations=$((violations+1))
          fi
          if [ "$violations" -gt 0 ]; then
            echo "$violations violacoes encontradas. Falhando o smoke test."
            exit 1
          fi
          echo "OK: separacao Nexus Partners Pack x Nexus Affil'IA'te validada em producao."

      - name: Resumo dos smoke tests
        if: always()
        run: |
          {
            echo "## 🧪 Production Smoke Tests"
            echo
            echo "- Portal raiz: https://oneverso.com.br"
            echo "- SPA fallback: https://oneverso.com.br/login"
            echo "- API health: https://api.oneverso.com.br/health"
            echo
            echo "Status final: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"
