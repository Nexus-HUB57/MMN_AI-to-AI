name: 🚀 PRD v2.2 — Go Live Nexus AffilIAte (Helena Nexus)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Digite GO-LIVE para confirmar deploy em produção'
        required: true
        default: 'GO-LIVE'
      skip_frontend_build:
        description: 'Pular build frontend?'
        required: false
        default: 'false'
  push:
    tags:
      - 'v2.2.*'

env:
  REMOTE_APP: /var/www/oneverso/current
  REMOTE_REPO: /var/www/oneverso/repo
  VPS_HOST: 143.95.213.237
  VPS_PORT: 22022
  VPS_USER: root

jobs:
  deploy:
    name: 🚀 Deploy v2.2.0
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'GO-LIVE' || startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔑 Setup SSH key
        env:
          # Fix 15/07: nome canônico VPS_SSH_PRIVATE_KEY com fallback para HOSTGATOR_SSH_KEY,
          # que é o nome que está atualmente povoado nos Secrets do repo.
          SSH_KEY_PRIMARY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          SSH_KEY_FALLBACK: ${{ secrets.HOSTGATOR_SSH_KEY }}
          SSH_KEY_PASSPHRASE: ${{ secrets.HOSTGATOR_SSH_PASSPHRASE }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # Escolhe o primeiro segredo não vazio
          if [ -n "$SSH_KEY_PRIMARY" ]; then
            SRC=VPS_SSH_PRIVATE_KEY
            printf '%s\n' "$SSH_KEY_PRIMARY" > ~/.ssh/deploy_key
          elif [ -n "$SSH_KEY_FALLBACK" ]; then
            SRC=HOSTGATOR_SSH_KEY
            printf '%s\n' "$SSH_KEY_FALLBACK" > ~/.ssh/deploy_key
          else
            echo "❌ Nenhum secret de chave privada encontrado."
            echo "   Esperado: secrets.VPS_SSH_PRIVATE_KEY (preferido) ou secrets.HOSTGATOR_SSH_KEY."
            exit 1
          fi
          chmod 600 ~/.ssh/deploy_key

          # Validação forte: BEGIN + END presentes
          if ! grep -q "BEGIN.*PRIVATE KEY" ~/.ssh/deploy_key || ! grep -q "END.*PRIVATE KEY" ~/.ssh/deploy_key; then
            echo "❌ Secret $SRC não parece ser uma chave OpenSSH válida (faltam marcadores BEGIN/END)."
            echo "   Bytes: $(wc -c < ~/.ssh/deploy_key)  Linhas: $(wc -l < ~/.ssh/deploy_key)"
            exit 1
          fi

          # Derivar e exibir fingerprint da PUBLIC key (nunca a privada)
          if [ -n "$SSH_KEY_PASSPHRASE" ]; then
            # Extrai pública sem prompt via ssh-keygen -y (aceita passphrase via -P)
            ssh-keygen -y -P "$SSH_KEY_PASSPHRASE" -f ~/.ssh/deploy_key > ~/.ssh/deploy_key.pub 2>/dev/null \
              || { echo "❌ Passphrase inválida para $SRC"; exit 1; }
          else
            ssh-keygen -y -P "" -f ~/.ssh/deploy_key > ~/.ssh/deploy_key.pub 2>/dev/null \
              || { echo "❌ Chave $SRC exige passphrase mas HOSTGATOR_SSH_PASSPHRASE não foi definido."; exit 1; }
          fi
          FP=$(ssh-keygen -lf ~/.ssh/deploy_key.pub | awk '{print $2}')
          echo "✅ SSH key preparada · fonte=$SRC · fingerprint pública=$FP"
          echo "ℹ️  Autorize esta pública em ~/.ssh/authorized_keys do $VPS_USER@$VPS_HOST se ainda não estiver."

          # Se houver passphrase, carrega em ssh-agent para o restante do job
          if [ -n "$SSH_KEY_PASSPHRASE" ]; then
            eval "$(ssh-agent -s)" >/dev/null
            echo "$SSH_KEY_PASSPHRASE" | SSH_ASKPASS=/bin/cat DISPLAY=:0 ssh-add ~/.ssh/deploy_key <<< "$SSH_KEY_PASSPHRASE" >/dev/null 2>&1 || true
            # export para os steps seguintes
            echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
            echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"
          fi

          # known_hosts
          ssh-keyscan -p $VPS_PORT $VPS_HOST >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: 🩺 Pré-check conexão SSH
        run: |
          # BatchMode + PreferredAuthentications=publickey evitam qualquer prompt de senha e log poluído.
          set +e
          OUT=$(ssh -i ~/.ssh/deploy_key -p $VPS_PORT \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o BatchMode=yes \
              -o PreferredAuthentications=publickey \
              -o ConnectTimeout=15 \
              $VPS_USER@$VPS_HOST \
              "echo '✅ Conectado' && uname -a && pm2 list --no-color | head -15" 2>&1)
          RC=$?
          echo "$OUT"
          if [ "$RC" -ne 0 ]; then
            echo "::error::SSH pré-check falhou (RC=$RC)."
            echo "Provável causa: a chave pública correspondente NÃO está em ~/.ssh/authorized_keys do $VPS_USER@$VPS_HOST:$VPS_PORT."
            echo "Passos para o COO/CTO:"
            echo "  1) copiar a fingerprint pública impressa no step Setup SSH key acima"
            echo "  2) autorizar a pública no VPS:  ssh -p $VPS_PORT $VPS_USER@$VPS_HOST 'echo <PUBKEY> >> ~/.ssh/authorized_keys && chmod 600 ~/.ssh/authorized_keys'"
            echo "  3) rerun deste workflow"
            exit $RC
          fi

      - name: 🗄️ Backup PostgreSQL
        run: |
          ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST \
              "sudo -u postgres pg_dump nexus_prod | gzip > /var/backups/oneverso-pre-prd-v22-\$(date +%Y%m%d_%H%M%S).sql.gz && ls -lh /var/backups/oneverso-pre-prd-v22-*.sql.gz | tail -1"

      - name: 📤 Upload artefatos v2.2
        run: |
          scp -i ~/.ssh/deploy_key -P $VPS_PORT -o StrictHostKeyChecking=no \
              docs/migrations/2026-07-01_prd_v22.sql \
              $VPS_USER@$VPS_HOST:/tmp/prd_v22_migration.sql
          scp -i ~/.ssh/deploy_key -P $VPS_PORT -o StrictHostKeyChecking=no \
              scripts/deploy/frontend_patches_v22.py \
              $VPS_USER@$VPS_HOST:/tmp/prd_v22_frontend.py

      - name: 🛢️ Executar migration SQL
        run: |
          ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST \
              "sudo -u postgres psql -d nexus_prod -f /tmp/prd_v22_migration.sql 2>&1 | tail -30" | tee migration.log
          echo "═══ Validação métricas ═══"
          grep -E 'admin_count|meeting_signals|commission_rules|settings_email|marketplace_orders|materials' migration.log || true

      - name: 🎨 Aplicar patches frontend
        run: |
          ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST \
              "cd $REMOTE_APP && FRONTEND_PATH=$REMOTE_APP/frontend/src python3 /tmp/prd_v22_frontend.py"

      - name: 🏗️ Build frontend
        if: github.event.inputs.skip_frontend_build != 'true'
        run: |
          ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST \
              "cd $REMOTE_APP/frontend && npm run build 2>&1 | tail -15"

      - name: 🔄 Restart PM2
        run: |
          ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST \
              "pm2 restart mmn-api && sleep 3 && pm2 list --no-color"

      - name: 🧪 Smoke tests
        run: |
          set -e
          FAILED=0
          for ep in "api/health" "api/health/pix" "api/public/ebooks" "api/public/academia/catalog" "api/trpc/banking.getBtcBrlQuote?input=%7B%7D"; do
            STATUS=$(curl -sS -o /dev/null -w "%{http_code}" -m 15 "https://oneverso.com.br/$ep")
            echo "  /$ep => HTTP $STATUS"
            [ "$STATUS" = "200" ] || FAILED=$((FAILED+1))
          done
          [ "$FAILED" = "0" ] && echo "✅ Todos endpoints 200 OK" || { echo "❌ $FAILED endpoints falharam"; exit 1; }

      - name: 🏷️ Tag v2.2.0
        if: startsWith(github.ref, 'refs/tags/') == false && success()
        run: |
          git config user.name "Helena Nexus"
          git config user.email "helena@nexus-affiliate.ai"
          git tag -f v2.2.0
          git push origin v2.2.0 --force || true

      - name: 📊 Sumário
        if: always()
        run: |
          echo "════════════════════════════════════════"
          echo "🚀 PRD v2.2.0 — Nexus AffilIAte"
          echo "Owner: Helena Nexus (CMO/AI)"
          echo "Host: $VPS_HOST:$VPS_PORT"
          echo "Health: https://oneverso.com.br/api/health"
          echo "════════════════════════════════════════"
