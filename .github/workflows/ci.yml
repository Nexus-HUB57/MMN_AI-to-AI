name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-monorepo:
    name: Validar monorepo
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      CI: "true"
      FORCE_COLOR: "1"
      NODE_OPTIONS: --max-old-space-size=4096

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Instalar dependências com lockfile
        run: npm ci --legacy-peer-deps

      - name: Diagnosticar workspaces
        run: npm run doctor:workspaces

      - name: Executar typecheck
        run: npm run typecheck

      - name: Executar lint completo
        run: npm run lint

      - name: Executar build completo
        run: npm run build

      - name: Executar testes críticos da Fase 8
        run: npm run test:phase8
        env:
          NODE_ENV: test

      - name: Resumo do CI
        if: always()
        run: |
          {
            echo "## 🧪 MMN AI-to-AI — Validação do Monorepo"
            echo
            echo "| Campo | Valor |"
            echo "|---|---|"
            echo "| Repositório | ${{ github.repository }} |"
            echo "| Branch | ${{ github.ref_name }} |"
            echo "| Commit | ${{ github.sha }} |"
            echo "| Autor | ${{ github.actor }} |"
            echo
            if [ "${{ job.status }}" = "success" ]; then
              echo "### ✅ Typecheck, lint, build e testes críticos executados com sucesso"
              echo "- Frontend validado"
              echo "- Backend validado"
              echo "- Mobile web export validado"
              echo "- Memória do typecheck estabilizada com NODE_OPTIONS"
            else
              echo "### ❌ Falha na validação do monorepo"
              echo "Verifique os logs da execução para identificar a etapa que falhou."
              echo
              echo "🔗 [Abrir logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  notify-failure:
    name: Resumo de falha
    runs-on: ubuntu-latest
    needs: [validate-monorepo]
    if: failure()
    steps:
      - name: Publicar resumo
        run: |
          {
            echo "## ❌ MMN AI-to-AI — CI falhou"
            echo
            echo "| Campo | Valor |"
            echo "|-------|-------|"
            echo "| Repositório | ${{ github.repository }} |"
            echo "| Branch | ${{ github.ref_name }} |"
            echo "| Commit | ${{ github.sha }} |"
            echo "| Autor | ${{ github.actor }} |"
            echo "| Mensagem | ${{ github.event.head_commit.message || github.event.pull_request.title || 'n/a' }} |"
            echo
            echo "🔗 [Ver logs completos](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo
            echo "> O deploy automático para o Replit foi bloqueado até que o CI passe."
          } >> "$GITHUB_STEP_SUMMARY"
