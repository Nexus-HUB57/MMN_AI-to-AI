<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Busca — Academ'IA</title>
  <link rel="stylesheet" href="acad-style.css" />
  <style>
    .search-hero {
      text-align: center;
      padding: 60px 20px 40px;
      background: linear-gradient(135deg, var(--bg-card), var(--bg-elev));
      border-radius: 12px;
      margin-bottom: 32px;
      border: 1px solid var(--border);
    }
    
    .search-hero h1 {
      font-size: 2.5rem;
      background: linear-gradient(135deg, var(--accent), var(--accent-purple));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }
    
    .big-search {
      max-width: 700px;
      margin: 24px auto 0;
      position: relative;
    }
    
    .big-search input {
      width: 100%;
      padding: 18px 24px 18px 56px;
      font-size: 1.2rem;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 10px;
      color: var(--fg);
      font-family: inherit;
      transition: all 0.2s ease;
    }
    
    .big-search input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.15);
    }
    
    .big-search-icon {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.5rem;
      color: var(--fg-muted);
    }
    
    .search-tip {
      margin-top: 12px;
      font-size: 0.85rem;
      color: var(--fg-muted);
    }
    
    .results {
      display: grid;
      gap: 12px;
    }
    
    .result {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 18px 20px;
      transition: all 0.2s ease;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    
    .result:hover {
      border-color: var(--accent);
      transform: translateX(4px);
      box-shadow: 0 4px 16px rgba(6, 182, 212, 0.15);
    }
    
    .result-tipo {
      display: inline-block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 3px 8px;
      border-radius: 3px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    
    .result-tipo.curso { background: var(--accent); color: #000; }
    .result-tipo.apostila { background: var(--accent-gold); color: #000; }
    .result-tipo.webinar { background: var(--accent-red); color: #fff; }
    .result-tipo.roteiro { background: var(--accent-purple); color: #fff; }
    
    .result-titulo {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 4px;
    }
    
    .result-trilha {
      font-size: 0.8rem;
      color: var(--fg-muted);
      margin-bottom: 8px;
    }
    
    .result-snippet {
      font-size: 0.9rem;
      color: var(--fg);
      line-height: 1.5;
    }
    
    .result-snippet mark {
      background: rgba(6, 182, 212, 0.3);
      color: var(--accent);
      padding: 0 2px;
      border-radius: 2px;
    }
    
    .no-results {
      text-align: center;
      padding: 60px 20px;
      color: var(--fg-muted);
    }
    
    .no-results-icon {
      font-size: 4rem;
      margin-bottom: 16px;
    }
    
    .suggestions {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    
    .suggestion {
      padding: 6px 12px;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 16px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .suggestion:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    
    .stats {
      text-align: center;
      color: var(--fg-muted);
      margin: 16px 0 24px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="search-hero">
    <h1>🔍 Busca Global</h1>
    <p>Pesquise em <strong>15 cursos</strong>, <strong>10 apostilas</strong>, <strong>3 webinars</strong> e <strong>roteiros</strong>.</p>
    
    <div class="big-search">
      <span class="big-search-icon">🔎</span>
      <input 
        type="text" 
        id="searchInput" 
        placeholder="Digite: IOAID, SHO, judge, CAC, mTLS..."
        autofocus
      />
    </div>
    
    <p class="search-tip">
      💡 Dica: pressione <kbd>Ctrl</kbd>+<kbd>K</kbd> em qualquer página para abrir a busca.
    </p>
  </div>
  
  <p class="stats" id="stats"></p>
  
  <div class="results" id="results">
    <div class="no-results">
      <div class="no-results-icon">👆</div>
      <p>Digite acima para começar a buscar.</p>
      <div class="suggestions">
        <span class="suggestion" data-q="IOAID">IOAID</span>
        <span class="suggestion" data-q="SHO">SHO</span>
        <span class="suggestion" data-q="judge">judge</span>
        <span class="suggestion" data-q="agente">agente</span>
        <span class="suggestion" data-q="whatsapp">whatsapp</span>
        <span class="suggestion" data-q="CAC">CAC</span>
        <span class="suggestion" data-q="mTLS">mTLS</span>
        <span class="suggestion" data-q="skill">skill</span>
        <span class="suggestion" data-q="churn">churn</span>
      </div>
    </div>
  </div>

  <script>
    const index = JSON.parse(document.getElementById('searchIndex').textContent);
    const input = document.getElementById('searchInput');
    const resultsEl = document.getElementById('results');
    const statsEl = document.getElementById('stats');
    
    // Suporte a ?q= na URL
    const urlParams = new URLSearchParams(window.location.search);
    const initialQ = urlParams.get('q');
    if (initialQ) {
      input.value = initialQ;
    }
    
    function search(query) {
      if (!query || query.length < 2) {
        resultsEl.innerHTML = `
          <div class="no-results">
            <div class="no-results-icon">👆</div>
            <p>Digite acima para começar a buscar.</p>
            <div class="suggestions">
              <span class="suggestion" data-q="IOAID">IOAID</span>
              <span class="suggestion" data-q="SHO">SHO</span>
              <span class="suggestion" data-q="judge">judge</span>
              <span class="suggestion" data-q="agente">agente</span>
              <span class="suggestion" data-q="whatsapp">whatsapp</span>
              <span class="suggestion" data-q="CAC">CAC</span>
              <span class="suggestion" data-q="mTLS">mTLS</span>
              <span class="suggestion" data-q="skill">skill</span>
            </div>
          </div>
        `;
        statsEl.textContent = '';
        attachSuggestionListeners();
        return;
      }
      
      const q = query.toLowerCase();
      const matches = index.filter(item => {
        return item.titulo.toLowerCase().includes(q) ||
               item.keywords.some(k => k.toLowerCase().includes(q)) ||
               item.trilha.toLowerCase().includes(q);
      });
      
      statsEl.innerHTML = matches.length > 0 
        ? `Encontrados <strong>${matches.length}</strong> resultados para "<strong>${query}</strong>"`
        : '';
      
      if (matches.length === 0) {
        resultsEl.innerHTML = `
          <div class="no-results">
            <div class="no-results-icon">🔍</div>
            <p>Nenhum resultado para "<strong>${query}</strong>".</p>
            <p style="margin-top: 8px;">Tente termos mais genéricos como "agente", "skill", "judge".</p>
          </div>
        `;
        return;
      }
      
      resultsEl.innerHTML = matches.map(item => {
        const tituloHtml = highlight(item.titulo, q);
        return `
          <a href="${item.href}" class="result">
            <span class="result-tipo ${item.tipo}">${item.tipo}</span>
            <div class="result-trilha">📍 ${item.trilha}</div>
            <div class="result-titulo">${tituloHtml}</div>
            <div class="result-snippet">Palavras-chave: ${item.keywords.slice(0, 5).map(k => 
              k.toLowerCase().includes(q) ? `<mark>${k}</mark>` : k
            ).join(' · ')}</div>
          </a>
        `;
      }).join('');
    }
    
    function highlight(text, query) {
      const regex = new RegExp(`(${query})`, 'gi');
      return text.replace(regex, '<mark>$1</mark>');
    }
    
    function attachSuggestionListeners() {
      document.querySelectorAll('.suggestion').forEach(el => {
        el.addEventListener('click', () => {
          input.value = el.dataset.q;
          search(el.dataset.q);
        });
      });
    }
    
    let timeout;
    input.addEventListener('input', (e) => {
      clearTimeout(timeout);
      timeout = setTimeout(() => search(e.target.value), 200);
    });
    
    attachSuggestionListeners();
    
    // Buscar inicial se tiver query
    if (initialQ) {
      search(initialQ);
    }
  </script>
  
  <script src="enhance.js"></script>
